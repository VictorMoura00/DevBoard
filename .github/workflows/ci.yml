name: CI

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read

jobs:
  build-test-and-docker:
    name: build-test-and-docker
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          global-json-file: global.json
          cache: true

      - name: Restore
        run: dotnet restore DevBoard.slnx

      - name: Build
        run: dotnet build DevBoard.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test DevBoard.slnx --configuration Release --no-build

      - name: Validate Docker Compose
        run: docker compose config

      - name: Build API image
        run: docker compose build api
