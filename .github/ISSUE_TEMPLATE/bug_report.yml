name: Bug report
description: Report a defect affecting behavior, build stability, or Docker startup.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: Describe the bug clearly and objectively.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: List the steps needed to reproduce the problem.
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - API
        - Docker
        - CI
        - Projects module
        - Tasks module
        - Notifications module
        - Documentation
    validations:
      required: true
